name: Rust CI

on:
    workflow_dispatch:
    push:
        paths:
            - "**.rs"
            - "**.toml"
            - "**.lock"
            - "**.html"
            - "**.css"
            - "**/typst/**"
            - "**/playwright-tests/**"
            - "**rust-ci.yml"

env:
    CARGO_TERM_COLOR: always

jobs:
    build-test-lint-audit:
        name: Build, test, clippy, audit
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Use dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-cargo-
            - name: Build
              run: cargo build --verbose
            - name: Install cargo-nextest
              uses: taiki-e/install-action@nextest
            - name: Test
              run: cargo nextest run --verbose
            - name: Clippy
              run: cargo clippy --verbose -- -D warnings
            - name: Check fmt
              run: cargo fmt --all -- --check
            - name: Audit Rust Dependencies
              uses: actions-rust-lang/audit@v1

    playwright-tests:
        name: Run Playwright Tests
        runs-on: ubuntu-latest

        needs: build-test-lint-audit

        timeout-minutes: 60
        defaults:
            run:
                working-directory: ./playwright-tests

        steps:
            - uses: actions/checkout@v6
            - name: Use dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-web-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-cargo-web-
            - uses: actions/setup-node@v6
              with:
                  node-version: lts/*
            - name: Install Rust Stable for WASM
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  target: wasm32-unknown-unknown
                  override: true
            - name: Install trunk for WASM build
              uses: taiki-e/install-action@trunk
            - name: Install dependencies
              run: npm ci
            - name: Install Playwright Browsers
              run: npx playwright install --with-deps
            - name: Run Playwright tests
              run: npx playwright test
            - uses: actions/upload-artifact@v7
              if: ${{ !cancelled() }}
              with:
                  name: playwright-report
                  path: playwright-tests/playwright-report/
                  retention-days: 30

    publish-github-pages:
        name: Deploy to GitHub Pages
        runs-on: ubuntu-latest

        needs: playwright-tests
        if: github.ref_name == github.event.repository.default_branch

        permissions:
            id-token: write
            pages: write

        concurrency:
            group: ${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Use dependencies cache
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cargo/bin/
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-cargo-web-release-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: ${{ runner.os }}-cargo-web-release-

            - name: Install Rust Stable for WASM
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  target: wasm32-unknown-unknown
                  override: true

            - name: Install trunk for WASM build
              uses: taiki-e/install-action@trunk

            - name: Build wasm page
              run: |
                  trunk build --release

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: "./dist"

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    success:
        name: Check success
        needs: [build-test-lint-audit, playwright-tests, publish-github-pages]
        if: always()
        runs-on: ubuntu-slim
        steps:
            - name: Print all results
              run: echo '${{ toJSON(needs) }}'
            - name: Exit if any failures or cancellations
              if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
              run: exit 1
